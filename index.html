<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Arraial Connect</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >
</head>

<body>

  <section class="home">

    <div class="overlay"></div>

    <!-- MENU -->

    <div class="menu">
      <i class="fa-solid fa-bars"></i>
    </div>

    <!-- BANDEIRAS -->

    <div class="flags">
      🔥🌽🪗🎉
    </div>

    <!-- LOGO -->

    <div class="logo">


      <h1>
        Nosso <br>
        Arraial
      </h1>

    </div>

    <!-- LOGIN -->

    <div class="login-form">
      <input id="email" type="email" placeholder="E-mail" />
      <input id="password" type="password" placeholder="Senha" />
    </div>

    <!-- BOTÕES -->

    <div class="buttons">

      <button id="loginButton" class="login">
        Entrar
      </button>

      <button id="googleButton" class="google" type="button">
        Entrar com Google
      </button>

    </div>

  </section>

  <script>
    const loginButton = document.getElementById('loginButton');
    const googleButton = document.getElementById('googleButton');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    loginButton.addEventListener('click', () => {
      if (emailInput.value.trim() === '' || passwordInput.value.trim() === '') {
        alert('Por favor, preencha e-mail e senha.');
        return;
      }
      window.location.href = 'festas.html';
    });

    googleButton.addEventListener('click', () => {
      window.location.href = 'festas.html';
    });

    document.querySelectorAll('.category-button').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.category-button').forEach(item => item.classList.remove('active'));
        button.classList.add('active');
      });
    });

    // ===== TEMPERATURA E COR DE FUNDO =====
    function atualizarTemperatura() {
      // Usa geolocation se disponível para buscar coordenadas
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (posicao) => {
            buscarTemperaturaOpenMeteo(posicao.coords.latitude, posicao.coords.longitude);
          },
          (erro) => {
            console.error('Geolocalização não permitida:', erro);
            buscarTemperaturaPadrao();
          }
        );
      } else {
        buscarTemperaturaPadrao();
      }
    }

    function buscarTemperaturaOpenMeteo(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=celsius`;
      fetch(url)
        .then(response => response.json())
        .then(dados => {
          if (dados && dados.current_weather && typeof dados.current_weather.temperature === 'number') {
            const temperatura = Math.round(dados.current_weather.temperature);
            aplicarTemperatura(temperatura, 'Sua cidade');
          } else {
            console.error('Dados de clima inválidos:', dados);
            buscarTemperaturaPadrao();
          }
        })
        .catch(erro => {
          console.error('Erro ao buscar temperatura Open-Meteo:', erro);
          buscarTemperaturaPadrao();
        });
    }

    function buscarTemperaturaPadrao() {
      const lat = -23.55052; // São Paulo
      const lon = -46.633308;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=celsius`;
      fetch(url)
        .then(response => response.json())
        .then(dados => {
          if (dados && dados.current_weather && typeof dados.current_weather.temperature === 'number') {
            const temperatura = Math.round(dados.current_weather.temperature);
            aplicarTemperatura(temperatura, 'São Paulo');
          } else {
            console.error('Dados de clima padrão inválidos:', dados);
            aplicarTemperaturaFallback();
          }
        })
        .catch(erro => {
          console.error('Erro ao buscar temperatura padrão Open-Meteo:', erro);
          aplicarTemperaturaFallback();
        });
    }

    function aplicarTemperaturaFallback() {
      const temperaturas = [10, 20, 25, 32];
      const temperatura = temperaturas[Math.floor(Math.random() * temperaturas.length)];
      aplicarTemperatura(temperatura, 'Festa Junina');
    }

    function aplicarTemperatura(temperatura, cidade) {
      const homeSection = document.querySelector('.home');
      if (!homeSection) return;

      let cor = '';
      let descricao = '';
      let overlay = '';

      if (temperatura < 15) {
        cor = 'linear-gradient(135deg, #3498db 0%, #2980b9 100%)';
        overlay = 'linear-gradient(to bottom, rgba(52,152,219,0.35), rgba(41,128,185,0.25), rgba(255,120,0,0.2))';
        descricao = '❄️ Frio';
      } else if (temperatura < 22) {
        cor = 'linear-gradient(135deg, #f39c12 0%, #e67e22 100%)';
        overlay = 'linear-gradient(to bottom, rgba(243,156,18,0.35), rgba(230,126,34,0.25), rgba(255,120,0,0.2))';
        descricao = '🌤️ Morno';
      } else if (temperatura < 28) {
        cor = 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)';
        overlay = 'linear-gradient(to bottom, rgba(231,76,60,0.35), rgba(192,57,43,0.25), rgba(255,120,0,0.2))';
        descricao = '☀️ Quente';
      } else {
        cor = 'linear-gradient(135deg, #ff6347 0%, #dc143c 100%)';
        overlay = 'linear-gradient(to bottom, rgba(255,99,71,0.45), rgba(220,20,60,0.35), rgba(255,120,0,0.25))';
        descricao = '🔥 Muito Quente';
      }

      homeSection.style.setProperty('background', cor, 'important');
      homeSection.style.setProperty('background-size', 'cover', 'important');
      homeSection.style.setProperty('background-position', 'center', 'important');
      const overlayElement = homeSection.querySelector('.overlay');
      if (overlayElement) {
        overlayElement.style.setProperty('background', overlay, 'important');
      }

      let indicador = document.querySelector('.temperatura-indicator');
      if (!indicador) {
        indicador = document.createElement('div');
        indicador.className = 'temperatura-indicator';
        document.body.appendChild(indicador);
      }
      indicador.textContent = `${descricao} - ${temperatura}°C - ${cidade}`;
      console.log(`Temperatura aplicada: ${descricao} (${temperatura}°C)`);
    }

    document.addEventListener('DOMContentLoaded', () => {
      atualizarTemperatura();
      setInterval(atualizarTemperatura, 600000);
    });
  </script>
</body>
</html>
